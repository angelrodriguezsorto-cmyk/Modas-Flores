<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hilos | Modas Flores</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f8f8f8;
}

header{
    background:linear-gradient(135deg,#ffb366,#ff8c42);
    color:white;
    text-align:center;
    padding:40px;
}

header h1{
    font-size:50px;
}

.galeria{
    width:90%;
    margin:50px auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

.card{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
    transition:.3s;
}

.card:hover{
    transform:translateY(-10px);
}

.card img{
    width:100%;
    height:300px;
    object-fit:cover;
}

.card h3{
    text-align:center;
    padding:20px;
    color:#ff8c42;
}

.boton{
    display:block;
    width:250px;
    margin:40px auto;
    text-align:center;
    background:#ff8c42;
    color:white;
    padding:15px;
    text-decoration:none;
    border-radius:10px;
}

</style>
</head>
<body>

<header>
    <h1>🧵 Hilos</h1>
    <p>Gran variedad de colores y marcas.</p>
</header>

<div class="galeria">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518">
        <h3>Hilos de colores</h3>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1520607162513-77705c0f0d4a">
        <h3>Hilos para costura</h3>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f">
        <h3>Hilos resistentes</h3>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1503341455253-b2e723bb3dbb">
        <h3>Variedad de tonos</h3>
    </div>

</div>

<a href="index.html" class="boton">⬅ Volver al Inicio</a>

</body>
</html>
